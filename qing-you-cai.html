<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機青油菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機青油菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">青油菜 1 把、豆干 3 片、小辣椒</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>豆干切絲煎至微焦黃。</div><div class="step-item"><span class="step-num">2</span>放入青油菜段與辣椒快速翻炒。</div><div class="step-item"><span class="step-num">3</span>加鹽與少許胡椒粉調味。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>青油菜口感介於油菜與青江菜間，耐炒。</div>

  </div>
</div>
