<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機菠菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">煮湯火鍋系列</span>
    <h1>有機菠菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">菠菜 1 把、皮蛋 1 顆、蒜瓣</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>蒜瓣炸至金黃，加水煮滾成白湯。</div><div class="step-item"><span class="step-num">2</span>放入菠菜與皮蛋碎。</div><div class="step-item"><span class="step-num">3</span>煮至菠菜變軟吸附湯汁。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>皮蛋能讓菠菜湯頭變得濃郁如上湯。</div>
    <a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
  </div>
</div>
</body>
</html>
