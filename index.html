<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佳雨農場｜蔬菜料理建議</title>
<style>
body{font-family:'PingFang TC',sans-serif;background:#f6f7f4;color:#233126;line-height:1.7;margin:0}
.wrap{max-width:980px;margin:0 auto;padding:24px}
.hero{background:linear-gradient(135deg,#6f9967,#2f5a30);color:#fff;border-radius:24px;padding:34px 28px}
.hero h1{font-size:40px;line-height:1.2;margin:10px 0 12px}
.hero p{font-size:18px;max-width:760px}
.btn{display:inline-block;padding:14px 24px;background:#fff;color:#2e5a27;text-decoration:none;border-radius:10px;font-size:16px;font-weight:bold}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:22px}
.card{background:#fff;border:1px solid #dfe6da;border-radius:18px;padding:18px}
.card h3{margin:0 0 8px;color:#1f3d1a}
.card p{margin:0;color:#5f6f63}
@media (max-width: 680px){ .hero h1{font-size:32px} .hero p{font-size:16px} }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div>佳雨農場 Jiayu Farm</div>
    <h1>今晚這包菜，這樣煮最好吃</h1>
    <p>把佳雨農場常見葉菜整理成好找、好點、手機也方便看的料理頁。每一道菜都有兩種做法，回家就能直接煮。</p>
    <p><a class="btn" href="vegetables.html">查看蔬菜料理建議</a></p>
  </section>
  <section class="cards">
    <div class="card"><h3>兩種料理方式</h3><p>每一道菜都整理成兩種做法，方便依照家裡食材選擇。</p></div>
    <div class="card"><h3>三步驟就能完成</h3><p>全部用白話寫法，快速上手，不用看很久。</p></div>
    <div class="card"><h3>手機閱讀優先</h3><p>頁面維持簡潔，點進去就能直接看到做法。</p></div>
  </section>
</div>
</body>
</html>
