<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機青江菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機青江菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">青江菜 6 顆、香菇 3 朵、蠔油</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>青江菜對半切燙熟擺盤。</div><div class="step-item"><span class="step-num">2</span>香菇片炒香後加入蠔油與水勾芡。</div><div class="step-item"><span class="step-num">3</span>將香菇芡汁淋在青江菜上。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>選用佳雨小顆青江菜，口感最嫩。</div>
    <a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
  </div>
</div>
</body>
</html>
