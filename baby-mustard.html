<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機小芥菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機小芥菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">小芥菜 1 把、薑絲、鹹蛋 1 顆</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>小芥菜先汆燙 30 秒去除苦味。</div><div class="step-item"><span class="step-num">2</span>薑絲爆香後下鹹蛋碎炒至冒泡。</div><div class="step-item"><span class="step-num">3</span>放入芥菜快速拌炒沾裹蛋汁。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>鹹蛋的油脂能讓小芥菜轉苦為甘。</div>
    <a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
  </div>
</div>
</body>
</html>
