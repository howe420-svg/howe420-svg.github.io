<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機油菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">油菜 1 把、豬肉絲 50g、紅蘿蔔絲少許</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>肉絲先與少許醬油醃過下鍋炒熟。</div><div class="step-item"><span class="step-num">2</span>放入油菜與紅蘿蔔絲大火翻炒。</div><div class="step-item"><span class="step-num">3</span>加少許米酒熗鍋香氣更足。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>油菜梗脆口，適合搭配肉類增加風味。</div>
