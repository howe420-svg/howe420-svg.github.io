<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機青松菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">特色葉菜系列</span>
    <h1>有機青松菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">青松菜 1 把、櫻花蝦、薑末</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>薑末與櫻花蝦爆香。</div><div class="step-item"><span class="step-num">2</span>放入青松菜大火翻炒 1 分鐘。</div><div class="step-item"><span class="step-num">3</span>起鍋前加少許糖帶出鮮味。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>櫻花蝦的鮮味能帶出青松菜的甜。</div>

</html>
