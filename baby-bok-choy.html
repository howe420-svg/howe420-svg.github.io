<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機小白菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機小白菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">小白菜 1 把、蝦皮少許、蒜末</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>蒜末與蝦皮爆香至微焦。</div><div class="step-item"><span class="step-num">2</span>放入小白菜大火翻炒 40 秒。</div><div class="step-item"><span class="step-num">3</span>灑少許鹽調味即起，避免出水。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>蝦皮的鹹香能帶出小白菜的清甜。</div>

  </div>
</div>

</html>
