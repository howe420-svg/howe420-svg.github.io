    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">莧菜 1 把、吻仔魚、蒜末</div>

    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>莧菜適合煮軟爛一點，口感更滑順。</div>
