<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機優愛白菜 完整做法 - 佳雨農場</title>
<style>
body { font-family: 'PingFang TC', 'Noto Sans TC', sans-serif; background: #f6f7f3; padding: 20px; color: #233126; line-height: 1.8; margin: 0; }
.recipe-container { max-width: 720px; margin: 24px auto; background: white; padding: 28px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
.tag { background: #2e5a27; color: white; padding: 5px 12px; border-radius: 999px; font-size: 0.85em; display: inline-block; }
h1 { color: #23401e; border-bottom: 1px solid #edf1eb; padding-bottom: 12px; margin-top: 12px; font-size: 2em; }
.section-title { font-weight: 700; color: #2e7d32; margin-top: 26px; border-left: 4px solid #81c784; padding-left: 10px; }
.ingredients-box { background: #f1f8f1; padding: 15px; border-radius: 10px; margin: 10px 0; font-size: 0.98em; }
.step-item { margin: 14px 0; padding-left: 34px; position: relative; }
.step-num { position: absolute; left: 0; top: 3px; background: #e8f5e9; color: #2e7d32; width: 22px; height: 22px; border-radius: 50%; text-align: center; line-height: 22px; font-size: 0.78em; font-weight: 700; }
.tip-box { background: #fffde7; border-radius: 10px; padding: 15px; margin-top: 25px; font-size: 0.95em; color: #555; }
.btn-back { display: block; text-align: center; margin-top: 30px; text-decoration: none; color: #5f6d61; font-size: 0.95em; }
</style>
</head>
<body>
<div class="recipe-container">
<span class="tag">特色葉菜</span>
<h1>有機優愛白菜</h1>
<div class="section-title">準備食材</div>
<div class="ingredients-box">優愛白菜 1 把、鹹蛋黃 2 顆</div>
<div class="section-title">料理步驟</div>
<div class="step-item"><span class="step-num">1</span>優愛白菜切段炒熟盛起備用。</div><div class="step-item"><span class="step-num">2</span>熱鍋將鹹蛋黃炒至起泡成金沙。</div><div class="step-item"><span class="step-num">3</span>放入白菜快速翻炒沾裹均勻。</div>
<div class="tip-box"><strong>佳雨農場小撇步：</strong><br>優愛白菜本身脆甜，與金沙極搭。</div>
<a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
</div>
