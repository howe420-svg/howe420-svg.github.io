  <div class="recipe-container">

    <h1>有機青花菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">青花菜 1 顆、蒜末、起司絲</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>青花菜切小朵汆燙 1 分鐘。</div><div class="step-item"><span class="step-num">2</span>瀝乾與蒜末、橄欖油拌勻入烤箱。</div><div class="step-item"><span class="step-num">3</span>灑上起司絲烤至金黃微焦。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>低卡健康的焗烤，保留完整營養。</div>
