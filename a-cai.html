<style>
body { font-family: 'PingFang TC', sans-serif; background: #fdfdfd; padding: 20px; color: #333; line-height: 1.8; }
.recipe-container { max-width: 650px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

.step-item { margin: 10px 0; padding-left: 25px; position: relative; }
.step-num { position: absolute; left: 0; background: #e8f5e9; color: #2e7d32; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 0.7em; font-weight: bold; }

<body>
<div class="recipe-container">
<span class="tag">家常快炒系列</span>
<h1>有機Ａ菜</h1>
<div class="section-title">準備食材</div>
<div class="ingredients-box">A 菜 1 把、甜酒釀腐乳 1 塊、蒜末</div>
<div class="section-title">料理步驟</div>
<div class="steps-container"><div class="step-item"><span class="step-num">1</span>腐乳壓碎調汁。</div><div class="step-item"><span class="step-num">2</span>蒜末爆香後下 A 菜快速翻動。</div><div class="step-item"><span class="step-num">3</span>淋上腐乳汁後大火炒勻即起。</div></div>
<div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>A 菜與腐乳是快炒界的黃金搭擋。</div>
