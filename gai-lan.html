<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機芥藍菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機芥藍菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">芥藍菜 1 把、薑片、砂糖少許</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>熱鍋下薑片，芥藍菜整株或切段下鍋。</div><div class="step-item"><span class="step-num">2</span>翻炒時加入少許砂糖與米酒。</div><div class="step-item"><span class="step-num">3</span>加 2 匙水蓋鍋蓋悶 20 秒即可。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>一點點糖能去除芥藍特有的苦澀感。</div>
    <a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
  </div>
</div>
</body>
</html>
