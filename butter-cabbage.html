<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機奶油白菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機奶油白菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">奶油白菜 250g、培根 2 片、奶油 10g</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>培根切段煸出油脂。</div><div class="step-item"><span class="step-num">2</span>下奶油白菜大火快炒至梗部稍軟。</div><div class="step-item"><span class="step-num">3</span>熄火前加入奶油拌勻。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>奶油與這款白菜自帶的奶香味是絕配。</div>

  </div>
</div>

</html>
