<!DOCTYPE html>

<head>

<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">煮湯火鍋系列</span>
    <h1>有機山菠菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">山菠菜 1 把、豆腐 1 盒、雞蛋 1 顆</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>水滾下豆腐丁與山菠菜段。</div><div class="step-item"><span class="step-num">2</span>滾起後淋入蛋液成花。</div><div class="step-item"><span class="step-num">3</span>灑點鹽與麻油調味即成。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>山菠菜比一般菠菜更有咬勁，適合滾湯。</div>
