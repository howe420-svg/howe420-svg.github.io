<!DOCTYPE html>

<head>

<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">特色葉菜系列</span>
    <h1>有機蜜雪兒白菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">蜜雪兒白菜、蝦仁、雞蛋</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>蝦仁炒熟盛起，下蛋液炒半熟。</div><div class="step-item"><span class="step-num">2</span>放入蜜雪兒白菜快炒 30 秒。</div><div class="step-item"><span class="step-num">3</span>混合蝦仁與蛋，加鹽翻勻。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>這款白菜口感細緻，與滑蛋是絕配。</div>
