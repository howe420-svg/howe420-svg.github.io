<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機奶油萵苣 完整做法 - 佳雨農場</title>
<style>
body { font-family: 'PingFang TC', sans-serif; background: #f6f7f4; padding: 20px; color: #333; line-height: 1.8; }
.recipe-container { max-width: 650px; margin: 0 auto; background: white; padding: 40px; border-radius: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); }
.tag { display:inline-block; background: #2e5a27; color: white; padding: 6px 16px; border-radius: 999px; font-size: 0.8em; }
h1 { color: #2e5a27; border-bottom: 1px solid #e8ece6; padding-bottom: 10px; margin-top: 24px; font-size: 48px; line-height:1.15; }
.method-block { margin-top: 28px; }
.method-title { font-weight: 700; color:#2e5a27; font-size: 28px; margin: 22px 0 10px; }
.section-title { font-weight: bold; color: #2e7d32; margin-top: 25px; border-left: 6px solid #81c784; padding-left: 12px; font-size: 20px; }
.ingredients-box { background: #f1f5f0; padding: 18px; border-radius: 10px; margin: 14px 0; font-size: 0.95em; }
.step-item { margin: 16px 0; padding-left: 40px; position: relative; font-size: 1em; }
.step-num { position: absolute; left: 0; top: 2px; background: #e8f5e9; color: #2e7d32; width: 28px; height: 28px; border-radius: 50%; text-align: center; line-height: 28px; font-size: 0.95em; font-weight: bold; }
.tip-box { background: #fff8dd; border-radius: 10px; padding: 18px; margin-top: 22px; font-size: 0.95em; color: #555; }
.btn-back { display: block; text-align: center; margin-top: 34px; text-decoration: none; color: #999; font-size: 0.95em; }
hr.sep { border:0; border-top:1px solid #ecefe9; margin: 30px 0; }
@media (max-width: 680px) {
 body { padding: 14px; }
 .recipe-container { padding: 28px 20px; border-radius: 24px; }
 h1 { font-size: 34px; }
 .method-title { font-size: 22px; }
}
</style>
</head>
<body>
<div class="recipe-container">
<span class="tag">生食沙拉系列</span>
<h1>有機奶油萵苣</h1>
<section class="method-block">
<div class="method-title">料理方式 1｜和風沙拉</div>
<div class="section-title">準備食材</div>
<div class="ingredients-box">奶油萵苣 150g、和風醬 2 大匙、玉米粒少許</div>
<div class="section-title">料理步驟</div>
<div class="steps-container"><div class="step-item"><span class="step-num">1</span>蔬菜洗淨瀝乾，撕成適口大小。</div><div class="step-item"><span class="step-num">2</span>加入玉米粒一起拌勻。</div><div class="step-item"><span class="step-num">3</span>淋上和風醬即可。</div></div>
<div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>葉菜一定要瀝乾，醬汁才不會被稀釋。</div>
</section>
<hr class="sep">
<section class="method-block">
<div class="method-title">料理方式 2｜凱薩輕食</div>
<div class="section-title">準備食材</div>
<div class="ingredients-box">奶油萵苣 150g、水煮蛋 1 顆、麵包丁少許、凱薩醬少許</div>
<div class="section-title">料理步驟</div>
<div class="steps-container"><div class="step-item"><span class="step-num">1</span>葉菜洗淨後冰鎮 5 分鐘。</div><div class="step-item"><span class="step-num">2</span>搭配水煮蛋與麵包丁擺盤。</div><div class="step-item"><span class="step-num">3</span>淋上凱薩醬即可享用。</div></div>
<div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>先冰一下，口感會更脆。</div>
</section>
<a href="vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
</div>
</body></html>
