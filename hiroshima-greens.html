<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機廣島菜 完整做法 - 佳雨農場</title>
<style>
:root{--bg:#f4f5f1;--card:#fff;--line:#d8e2d4;--text:#223126;--muted:#6d7c71;--green:#2f6a35;--soft:#eef4ec;--accent:#fff9df;--shadow:0 18px 40px rgba(31,61,28,.08)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f4f5f1 0,#eef1ea 100%);color:var(--text);font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.75}
.wrap{max-width:900px;margin:0 auto;padding:18px 14px 42px}
.hero{background:linear-gradient(135deg,#7bae75 0%,#2e6a34 100%);color:#fff;border-radius:34px;padding:26px 20px 24px;box-shadow:var(--shadow)}
.hero .tag{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);font-size:14px;font-weight:900}
.hero h1{margin:16px 0 10px;font-size:clamp(38px,8vw,64px);line-height:1.06;letter-spacing:1px}
.hero p{margin:0;color:rgba(255,255,255,.92);font-size:clamp(17px,3.6vw,22px)}
.main-card{margin-top:18px;background:rgba(255,255,255,.86);border:1px solid rgba(216,226,212,.95);backdrop-filter: blur(8px);border-radius:30px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
.method-card{background:linear-gradient(180deg,#fff 0%,#fbfcfa 100%);border:1px solid var(--line);border-radius:26px;padding:18px;margin-bottom:18px;box-shadow:0 10px 24px rgba(36,62,32,.04)}
.method-top{margin-bottom:14px}
.method-badge{display:inline-block;padding:7px 12px;border-radius:999px;background:var(--soft);color:var(--green);font-size:13px;font-weight:900;margin-bottom:10px}
.method-top h2{margin:0;font-size:clamp(26px,5vw,36px);line-height:1.18;color:var(--green)}
.info-box{margin-top:14px}
.section-head{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:900;color:var(--green);margin-bottom:10px}
.section-head:before{content:'';display:inline-block;width:6px;height:28px;border-radius:99px;background:#7ec785}
.ingredients{background:var(--soft);border-radius:18px;padding:18px;font-size:20px;line-height:1.75}
.steps{display:grid;gap:12px}
.step{display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:flex-start;padding:4px 0}
.step span{display:flex;justify-content:center;align-items:center;width:36px;height:36px;border-radius:999px;background:#e8f3e6;color:var(--green);font-weight:900;font-size:18px}
.step p{margin:0;font-size:22px;line-height:1.65}
.tip{margin-top:18px;background:var(--accent);border-radius:18px;padding:18px}
.tip strong{display:block;font-size:18px;color:#5c5a34;margin-bottom:6px}
.tip p{margin:0;font-size:21px;color:#54544a}
.nav{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}
.nav a{display:inline-block;padding:14px 18px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--green);text-decoration:none;font-weight:900}
@media (max-width:680px){
  .hero{border-radius:26px;padding:22px 16px 20px}
  .main-card{padding:14px;border-radius:24px}
  .method-card{padding:16px;border-radius:22px}
  .ingredients{font-size:18px}
  .step p{font-size:18px}
  .tip p{font-size:18px}
}
</style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="tag">特色蔬菜系列</span>
      <h1>有機廣島菜</h1>
      <p>廣島菜很適合清爽路線，做和風拌菜或淺漬小菜都很舒服。</p>
    </section>
    <section class="main-card">
      <section class="method-card">
          <div class="method-top">
            <div class="method-badge">經典做法</div>
            <h2>廣島菜拌和風醬</h2>
          </div>
          <div class="info-box">
            <div class="section-head">準備食材</div>
            <div class="ingredients">廣島菜 200g、和風醬適量、白芝麻少許</div>
          </div>
          <div class="info-box">
            <div class="section-head">料理步驟</div>
            <div class="steps"><div class="step"><span>1</span><p>廣島菜洗淨後切段。</p></div><div class="step"><span>2</span><p>可先略燙後放涼。</p></div><div class="step"><span>3</span><p>拌入和風醬與白芝麻即可。</p></div></div>
          </div>
          <div class="tip"><strong>佳雨農場小撇步</strong><p>冷著吃特別清爽，很適合夏天。</p></div>
      </section>
      <section class="method-card">
          <div class="method-top">
            <div class="method-badge">第二道料理</div>
            <h2>淺漬漬物</h2>
          </div>
          <div class="info-box">
            <div class="section-head">準備食材</div>
            <div class="ingredients">廣島菜 200g、鹽少許、香油少許、昆布水適量</div>
          </div>
          <div class="info-box">
            <div class="section-head">料理步驟</div>
            <div class="steps"><div class="step"><span>1</span><p>先用鹽抓過廣島菜，靜置一下。</p></div><div class="step"><span>2</span><p>擠去水分後拌入昆布水。</p></div><div class="step"><span>3</span><p>最後淋少許香油即可。</p></div></div>
          </div>
          <div class="tip"><strong>佳雨農場小撇步</strong><p>這道走的是清爽解膩路線，鹽不要下太重。</p></div>
      </section>
      <div class="nav">
        <a href="vegetables.html">← 返回蔬菜總覽</a>
        <a href="index.html">回首頁</a>
      </div>
    </section>
  </main>
</body>
</html>
