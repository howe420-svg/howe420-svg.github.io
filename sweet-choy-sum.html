  <div class="recipe-container">
    <span class="tag">煮湯火鍋系列</span>
    <h1>有機甜菜心</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">甜菜心 1 把、蠔油 1 匙、蒜酥</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>甜菜心整株汆燙 2 分鐘撈起。</div><div class="step-item"><span class="step-num">2</span>淋上蠔油與少許熱油。</div><div class="step-item"><span class="step-num">3</span>撒上蒜酥增加香氣。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>菜心厚實，汆燙時間要比葉菜長一點。</div>
