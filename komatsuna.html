<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機小松菜 完整做法 - 佳雨農場</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="page-wrap">
  <div class="recipe-container">
    <span class="tag">家常快炒系列</span>
    <h1>有機小松菜</h1>
    <div class="recipe-section-title">準備食材</div>
    <div class="ingredients-box">小松菜 1 把、雞蛋 2 顆、柴魚醬油少許</div>
    <div class="recipe-section-title">料理步驟</div>
    <div class="steps-container"><div class="step-item"><span class="step-num">1</span>蛋液先下鍋炒成碎蛋後盛起。</div><div class="step-item"><span class="step-num">2</span>小松菜切段下鍋快炒 1 分鐘。</div><div class="step-item"><span class="step-num">3</span>加入碎蛋與柴魚醬油翻炒均勻。</div></div>
    <div class="tip-box"><strong>💡 佳雨農場小撇步：</strong><br>小松菜鈣質高，搭配油脂能幫助吸收。</div>
    <a href="../vegetables.html" class="btn-back">← 返回蔬菜總覽</a>
  </div>
</div>
</body>
</html>
