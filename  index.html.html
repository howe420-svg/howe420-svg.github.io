<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佳雨農場｜安心有機，日常好煮</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;background:#f4f4ef;color:#1f2d22;line-height:1.8}
    img{max-width:100%;display:block}
    .wrap{width:min(100%,920px);margin:0 auto;padding:24px 18px 48px}
    .hero{background:linear-gradient(180deg,#4f9654 0%,#417f45 100%);color:#fff;border-radius:34px;padding:30px 22px 34px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
    .kicker{margin:0 0 14px;font-size:15px;font-weight:700;letter-spacing:.4px;opacity:.96}
    .hero h1{margin:0 0 14px;font-size:42px;line-height:1.12;font-weight:800;letter-spacing:.2px}
    .hero p{margin:0;font-size:16px;font-weight:600;color:rgba(255,255,255,.97)}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
    .btn{display:inline-block;padding:13px 22px;border-radius:999px;text-decoration:none;font-weight:800;font-size:16px;text-align:center}
    .btn-primary{background:#fff;color:#2f6f38}
    .btn-secondary{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.42)}
    .image-card,.section{background:#fff;border:1px solid #dde3d8;border-radius:30px;box-shadow:0 6px 18px rgba(0,0,0,.04)}
    .image-card{padding:14px;margin-top:22px}
    .image-card img{border-radius:22px}
    .image-caption{margin:12px 6px 2px;color:#47624a;font-size:14px;font-weight:700}
    .section{padding:26px 22px;margin-top:22px}
    .eyebrow{margin:0 0 10px;color:#3c7c43;font-size:14px;font-weight:800;letter-spacing:.3px}
    .section h2{margin:0 0 14px;font-size:28px;line-height:1.25;color:#1f2d22}
    .section p{margin:0;font-size:16px;color:#2f3b31}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:18px}
    .card{background:#fafbf8;border:1px solid #dce3d8;border-radius:24px;padding:20px 18px;text-decoration:none;color:inherit;min-height:140px;display:flex;flex-direction:column;justify-content:space-between}
    .card small{display:block;color:#7b877d;font-size:14px;font-weight:700;margin-bottom:8px}
    .card strong{display:block;font-size:20px;line-height:1.35;color:#26422b}
    .card span{display:inline-block;margin-top:10px;color:#3f8d4d;font-weight:800;font-size:15px}
    .brand-line{font-weight:800;color:#26422b;margin-bottom:10px}
    .footer-cta{margin-top:18px}
    @media (min-width:700px){
      .wrap{padding:28px 20px 56px}
      .hero{padding:38px 30px 40px}
      .hero h1{font-size:58px}
      .hero p{font-size:18px;max-width:760px}
      .section{padding:30px 28px}
      .section h2{font-size:34px}
      .grid{grid-template-columns:repeat(2,1fr)}
      .image-card{padding:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="kicker">佳雨農場｜安心有機，日常好煮</p>
      <h1>今天這包菜，<br>這樣煮最好吃</h1>
      <p>讓日常晚餐更簡單，也更安心。</p>
      <div class="actions">
        <a class="btn btn-primary" href="vegetables.html">查看料理建議總覽</a>
        <a class="btn btn-secondary" href="about.html">認識佳雨農場</a>
      </div>
    </section>

    <section class="image-card">
      <img src="homepage-hero-kitchen.jpeg" alt="佳雨農場料理示意圖">
      <p class="image-caption">從買回家，到端上桌，都更簡單、更安心。</p>
    </section>

    <section class="section">
      <p class="eyebrow">料理建議入口</p>
      <h2>今晚先從這裡開始</h2>
      <div class="grid">
        <a class="card" href="vegetables.html"><div><small>全部蔬菜</small><strong>查看料理建議總覽</strong></div><span>立即查看 →</span></a>
        <a class="card" href="vegetables.html"><div><small>今晚晚餐</small><strong>先看最常煮、最好上手的菜色</strong></div><span>快速進入 →</span></a>
      </div>
    </section>

    <section class="section">
      <p class="eyebrow">認識佳雨農場</p>
      <h2>安心有機，日常好煮</h2>
      <p class="brand-line">每一包菜都值得被好好料理</p>
      <p>佳雨農場希望把農場的用心，變成你每天都能放心端上桌的味道。除了安心種植，也把每一包菜的料理方式與保存方式整理得更清楚，讓你買回家之後，更容易煮、也更願意常常吃菜。</p>
      <div class="footer-cta"><a class="btn btn-primary" href="about.html">認識佳雨農場</a></div>
    </section>
  </div>
</body>
</html>
